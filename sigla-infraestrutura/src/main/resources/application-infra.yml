spring:
  datasource:
    url: ${SIGLA_DATASOURCE_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sigla}}
    username: ${SIGLA_DATASOURCE_USERNAME:${SPRING_DATASOURCE_USERNAME:sigla}}
    password: ${SIGLA_DATASOURCE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:sigla}}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

sigla:
  storage:
    attachment-root: var/attachments
